version: "3.9"
services:
  api:
    build: ./backend
    env_file: backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
  worker:
    build: ./backend
    command: ["node","dist/worker.js"]
    env_file: backend/.env
    depends_on:
      - redis
      - postgres
  web:
    build: ./frontend
    env_file: frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - api
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: digital_heroes
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
volumes:
  pgdata:
